<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Neural Redirect</title>
    <script>
        (async function() {
            // Configuration for the dual-cache strategy
            const CORE_CACHE_NAME = 'julia-static-core';
            const versionPath = '../js/VersionCore.js';
            const targetSubPath = "745596f4-2947-4d89-955f-f4148e07d22a/index.html";
            
            function updateStatus(msg, isError = false) {
                const status = document.getElementById('status');
                if (status) {
                    status.innerText = msg;
                    if (isError) status.style.color = '#ef4444'; // Red for errors
                }
                if (isError) console.error(msg);
                else console.log(msg);
            }

            async function getVersionAndRedirect() {
                let scriptText = null;

                try {
                    // STEP 1: Online Check (Cache-Bust to get the latest version from server)
                    const response = await fetch(versionPath + '?t=' + Date.now(), {
                        cache: 'no-store'
                    });
                    if (response.ok) {
                        scriptText = await response.text();
                        updateStatus("SYSTEM: Remote version detected.");
                        
                        // Mirror the fresh version into the persistent Core Cache
                        const cache = await caches.open(CORE_CACHE_NAME);
                        cache.put(versionPath, new Response(scriptText));
                    }
                } catch (e) {
                    updateStatus("SYSTEM: Network offline, checking local core cache...");
                }

                // STEP 2: Offline Fallback (Static Core Cache)
                if (!scriptText) {
                    try {
                        const cache = await caches.open(CORE_CACHE_NAME);
                        const cachedResponse = await cache.match(versionPath);
                        if (cachedResponse) {
                            scriptText = await cachedResponse.text();
                            updateStatus("SYSTEM: Version loaded from persistent cache.");
                        }
                    } catch (e) {
                        updateStatus("SYSTEM: Cache access failed.", true);
                    }
                }

                // STEP 3: Evaluation and Redirect
                if (scriptText) {
                    // Extract version number via regex from the file content
                    const match = scriptText.match(/"number":\s*"(\d+)"/);
                    if (match && match[1]) {
                        const version = match[1];
                        const targetUrl = `../v${version}/${targetSubPath}`;
                        updateStatus(`SYSTEM: Synchronizing with Node v${version}...`);
                        
                        // Brief delay for visual feedback before redirect
                        setTimeout(() => {
                            window.location.href = targetUrl;
                        }, 500);
                    } else {
                        updateStatus("SYSTEM ERROR: Invalid VersionCore format.", true);
                    }
                } else {
                    updateStatus("SYSTEM ERROR: Offline. No cached version data found.", true);
                }
            }

            // Logic execution
            if ('caches' in window) {
                getVersionAndRedirect();
            } else {
                // Legacy fallback for browsers without Cache API support
                const script = document.createElement('script');
                script.src = versionPath + '?t=' + Date.now();
                script.onload = () => {
                    if (typeof VersionCore !== 'undefined') {
                        window.location.href = `../v${VersionCore.info.number}/${targetSubPath}`;
                    }
                };
                script.onerror = () => updateStatus("CRITICAL: Offline and no cache support.", true);
                document.head.appendChild(script);
            }
        })();
    </script>
    <style>
        body { 
            background: #000; 
            color: #525252; 
            font-family: 'Inter', system-ui, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            overflow: hidden;
        }
        #status { 
            font-size: 10px; 
            text-transform: uppercase; 
            letter-spacing: 0.3em; 
            font-weight: 900;
            transition: color 0.3s ease;
        }
    </style>
</head>
<body>
    <div id="status">Establishing Neural Link...</div>
</body>
</html>
